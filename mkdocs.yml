site_name: etfray
site_url: https://etfray.readthedocs.io
repo_url: https://github.com/alwank/etfray
repo_name: alwank/etfray

theme:
  name: material
  palette:
    scheme: default
    primary: black
    accent: teal
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - User Guide:
      - ETF Research: user-guide/etf-research.md
      - Portfolio Analytics: user-guide/portfolio-analytics.md
      - IBKR Setup: user-guide/ibkr-setup.md
      - Keybindings: user-guide/keybindings.md
      - Configuration: user-guide/configuration.md
  - Tutorials:
      - Research Workflow: tutorials/research-workflow.md
      - Portfolio Setup: tutorials/portfolio-setup.md
      - Overlap Analysis: tutorials/overlap-analysis.md
      - Three-Fund Analysis: tutorials/three-fund-analysis.md
      - Margin Monitoring: tutorials/margin-monitoring.md
  - Developer:
      - Architecture: developer/architecture.md
      - Contributing: developer/contributing.md
  - Changelog: changelog.md
  - Roadmap: roadmap.md
